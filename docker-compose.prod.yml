version: '3.8'

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    volumes:
      - mssql-data:/var/opt/mssql
      - ./infra/mssql/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
      - ./infra/mssql/entrypoint.sh:/entrypoint.sh
    entrypoint: /bin/bash /entrypoint.sh
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 2G

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASS}"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redis-data:/data
    healthcheck:
      test: redis-cli -a "${REDIS_PASSWORD}" ping
      interval: 10s
      timeout: 5s
      retries: 5

  bpm-core:
    image: ghcr.io/${GITHUB_REPO}/bpm-core:${IMAGE_TAG:-latest}
    depends_on:
      mssql: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_PASSWORD: "${MSSQL_SA_PASSWORD}"
      SPRING_RABBITMQ_USERNAME: "${RABBITMQ_USER}"
      SPRING_RABBITMQ_PASSWORD: "${RABBITMQ_PASS}"
      SPRING_DATA_REDIS_PASSWORD: "${REDIS_PASSWORD}"
      BPM_WEBHOOK_HMAC_SECRET: "${WEBHOOK_HMAC_SECRET}"
    restart: unless-stopped

  form-service:
    image: ghcr.io/${GITHUB_REPO}/form-service:${IMAGE_TAG:-latest}
    depends_on:
      mssql: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_PASSWORD: "${MSSQL_SA_PASSWORD}"
      SPRING_RABBITMQ_USERNAME: "${RABBITMQ_USER}"
      SPRING_RABBITMQ_PASSWORD: "${RABBITMQ_PASS}"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - bpm-core
      - form-service
    restart: unless-stopped

volumes:
  mssql-data:
  rabbitmq-data:
  redis-data:
