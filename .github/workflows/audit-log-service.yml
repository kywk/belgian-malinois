name: CI/CD - Audit Log Service

on:
  push:
    branches: [dev, sit]
    paths: ['audit-log-service/**']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        type: choice
        options: [uat, prod]

env:
  SERVICE: audit-log-service
  IMAGE: ghcr.io/${{ github.repository }}/audit-log-service

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - run: mvn -f audit-log-service/pom.xml verify -q

  docker:
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: audit-log-service
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    needs: docker
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - run: echo "Deploying audit-log-service to DEV"

  deploy-sit:
    if: github.ref == 'refs/heads/sit'
    needs: docker
    runs-on: ubuntu-latest
    environment: sit
    steps:
      - run: echo "Deploying audit-log-service to SIT"

  deploy-manual:
    if: github.event_name == 'workflow_dispatch'
    needs: docker
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - run: echo "Deploying audit-log-service to ${{ inputs.environment }}"
