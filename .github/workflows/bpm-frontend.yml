name: CI/CD - BPM Frontend

on:
  push:
    branches: [dev, sit]
    paths: ['bpm-frontend/**']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        type: choice
        options: [uat, prod]

env:
  IMAGE: ghcr.io/${{ github.repository }}/bpm-frontend

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bpm-frontend/package-lock.json
      - run: cd bpm-frontend && npm ci && npm run build

  docker:
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: bpm-frontend
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    needs: docker
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - run: echo "Deploying bpm-frontend to DEV"

  deploy-sit:
    if: github.ref == 'refs/heads/sit'
    needs: docker
    runs-on: ubuntu-latest
    environment: sit
    steps:
      - run: echo "Deploying bpm-frontend to SIT"

  deploy-manual:
    if: github.event_name == 'workflow_dispatch'
    needs: docker
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - run: echo "Deploying bpm-frontend to ${{ inputs.environment }}"
