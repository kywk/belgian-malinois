name: CI/CD - BPM Core

on:
  push:
    branches: [dev, sit]
    paths: ['bpm-core/**']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        type: choice
        options: [uat, prod]

env:
  SERVICE: bpm-core
  IMAGE: ghcr.io/${{ github.repository }}/bpm-core

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - run: mvn -f bpm-core/pom.xml verify -q

  docker:
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: bpm-core
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    needs: docker
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - run: echo "Deploying bpm-core to DEV with image ${{ env.IMAGE }}:${{ github.sha }}"
      # Add actual deployment commands (kubectl, docker compose, etc.)

  deploy-sit:
    if: github.ref == 'refs/heads/sit'
    needs: docker
    runs-on: ubuntu-latest
    environment: sit
    steps:
      - run: echo "Deploying bpm-core to SIT with image ${{ env.IMAGE }}:${{ github.sha }}"

  deploy-manual:
    if: github.event_name == 'workflow_dispatch'
    needs: docker
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - run: echo "Deploying bpm-core to ${{ inputs.environment }} with image ${{ env.IMAGE }}:${{ github.sha }}"
