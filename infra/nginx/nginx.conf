worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream bpm_core {
        server bpm-core:8080;
    }

    upstream form_service {
        server form-service:8081;
    }

    upstream audit_log_service {
        server audit-log-service:8082;
    }

    server {
        listen 80;

        # 長路徑優先匹配：form-service
        location ^~ /api/forms {
            proxy_pass http://form_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }

        location ^~ /api/form-data {
            proxy_pass http://form_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }

        # 長路徑優先匹配：audit-log-service
        location ^~ /api/audit-logs {
            proxy_pass http://audit_log_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }

        # 預設 /api/* → bpm-core
        location /api/ {
            proxy_pass http://bpm_core;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }

        # 前端靜態資源（開發時可不啟用）
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
