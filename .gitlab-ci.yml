# ──────────────────────────────────────────────
# BPM Frontend
# ──────────────────────────────────────────────

bpm-frontend:build:
  image: node:20-alpine
  stage: build
  cache:
    key: npm
    paths: [bpm-frontend/node_modules]
  script:
    - cd bpm-frontend && npm ci && npm run build
  artifacts:
    paths: [bpm-frontend/dist]
  rules:
    - changes: [bpm-frontend/**]

bpm-frontend:docker:
  <<: *docker-build
  stage: docker
  script:
    - docker build -t $REGISTRY/bpm-frontend:$CI_COMMIT_SHA -t $REGISTRY/bpm-frontend:latest bpm-frontend/
    - docker push $REGISTRY/bpm-frontend:$CI_COMMIT_SHA
    - docker push $REGISTRY/bpm-frontend:latest
  needs: [bpm-frontend:build]
  rules:
    - changes: [bpm-frontend/**]

