# ──────────────────────────────────────────────
# BPMN Definitions Deploy
# ──────────────────────────────────────────────

bpmn:deploy:
  <<: *deploy-template
  stage: deploy
  script:
    - |
      # Determine environment
      case "$CI_COMMIT_BRANCH" in
        dev)  ENV=dev ;;
        sit)  ENV=sit ;;
        uat)  ENV=uat ;;
        main) ENV=prod ;;
        *)    ENV=dev ;;
      esac
      CONFIG_FILE="cicd/envs/${ENV}.yml"

      # Replace EL placeholders in BPMN files
      for bpmn in bpmn-definitions/**/*.bpmn*; do
        [ -f "$bpmn" ] || continue
        while IFS=': ' read -r key value; do
          [ -z "$key" ] || [ -z "$value" ] && continue
          sed -i "s/\${${key}}/${value}/g" "$bpmn"
        done < <(grep -v '^#' "$CONFIG_FILE" | grep -v '^bpmn\.' | grep ':')
      done

      # Deploy to Flowable
      BPM_URL="${BPM_CORE_URL:-http://bpm-core:8080}"
      for bpmn in bpmn-definitions/**/*.bpmn*; do
        [ -f "$bpmn" ] || continue
        echo "Deploying $bpmn to $ENV..."
        curl -sf -X POST "${BPM_URL}/api/deployments" \
          -F "file=@${bpmn}" -F "name=$(basename $bpmn)" || echo "WARN: Failed $bpmn"
      done
  rules:
    - changes: [bpmn-definitions/**]
