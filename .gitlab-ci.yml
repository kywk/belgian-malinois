variables:
  REGISTRY: ${CI_REGISTRY}
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"

stages:
  - build
  - test
  - docker
  - deploy

# ──────────────────────────────────────────────
# Templates
# ──────────────────────────────────────────────

.java-build: &java-build
  image: eclipse-temurin:21-jdk
  cache:
    key: maven-${CI_JOB_NAME}
    paths: [.m2/repository]

.docker-build: &docker-build
  image: docker:24
  services: [docker:24-dind]
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

.deploy-template: &deploy-template
  image: alpine:latest
  before_script:
    - apk add --no-cache curl

# ──────────────────────────────────────────────
# BPM Core
# ──────────────────────────────────────────────

bpm-core:build:
  <<: *java-build
  stage: build
  script: mvn -f bpm-core/pom.xml compile -q
  rules:
    - changes: [bpm-core/**]

bpm-core:test:
  <<: *java-build
  stage: test
  script: mvn -f bpm-core/pom.xml verify -q
  rules:
    - changes: [bpm-core/**]

bpm-core:docker:
  <<: *docker-build
  stage: docker
  script:
    - docker build -t $REGISTRY/bpm-core:$CI_COMMIT_SHA -t $REGISTRY/bpm-core:latest bpm-core/
    - docker push $REGISTRY/bpm-core:$CI_COMMIT_SHA
    - docker push $REGISTRY/bpm-core:latest
  needs: [bpm-core:test]
  rules:
    - changes: [bpm-core/**]

bpm-core:deploy-dev:
  <<: *deploy-template
  stage: deploy
  environment: { name: dev }
  script:
    - echo "Deploying bpm-core to DEV — $REGISTRY/bpm-core:$CI_COMMIT_SHA"
    # TODO: kubectl set image / docker compose pull
  needs: [bpm-core:docker]
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      changes: [bpm-core/**]

bpm-core:deploy-sit:
  <<: *deploy-template
  stage: deploy
  environment: { name: sit }
  script:
    - echo "Deploying bpm-core to SIT"
  needs: [bpm-core:docker]
  rules:
    - if: $CI_COMMIT_BRANCH == "sit"
      changes: [bpm-core/**]

bpm-core:deploy-uat:
  <<: *deploy-template
  stage: deploy
  environment: { name: uat }
  script:
    - echo "Deploying bpm-core to UAT"
  needs: [bpm-core:docker]
  rules:
    - if: $CI_COMMIT_BRANCH == "uat"
      when: manual

bpm-core:deploy-prod:
  <<: *deploy-template
  stage: deploy
  environment: { name: prod }
  script:
    - echo "Deploying bpm-core to PROD"
  needs: [bpm-core:docker]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual

